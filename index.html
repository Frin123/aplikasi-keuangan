<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Keuanganku</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --text: #1F2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: var(--primary);
            padding: 1rem;
            display: flex;
            justify-content: space-around;
        }
        nav button {
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        nav button:hover, nav button.active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .page { display: none; }
        .page.active { display: block; }
        
        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        input, select, button[type="submit"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }
        button[type="submit"] {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .radio-group { display: flex; gap: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        .total-row { font-weight: bold; font-size: 1.2rem; margin-top: 15px; text-align: right; }
        
        .summary-card {
            background: #E0E7FF; padding: 15px; border-radius: 8px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="showPage('page1')" class="active" id="nav-page1">Input</button>
        <button onclick="showPage('page2')" id="nav-page2">Pemasukan</button>
        <button onclick="showPage('page3')" id="nav-page3">Pengeluaran</button>
        <button onclick="showPage('page4')" id="nav-page4">Grafik</button>
    </nav>

    <div class="container">
        <div id="page1" class="page active">
            <h2>Catat Transaksi</h2>
            <form id="financeForm">
                <input type="date" id="tanggal" required>
                
                <div class="radio-group">
                    <label><input type="radio" name="jenis" value="Pemasukan" onchange="updateKategori()" required> Pemasukan</label>
                    <label><input type="radio" name="jenis" value="Pengeluaran" onchange="updateKategori()" required> Pengeluaran</label>
                </div>

                <select id="kategori" required>
                    <option value="" disabled selected>Pilih Jenis Dulu...</option>
                </select>

                <input type="number" id="nominal" placeholder="Nominal (Rp)" required>
                
                <button type="submit" id="btnSubmit">Simpan ke Google Sheets</button>
            </form>

            <div class="summary-card">
                <h3>Ringkasan Bulan Ini</h3>
                <p>Total Pemasukan: <span id="summaryMasuk" style="color: green; font-weight: bold;">Rp 0</span></p>
                <p>Total Pengeluaran: <span id="summaryKeluar" style="color: red; font-weight: bold;">Rp 0</span></p>
                <button onclick="fetchData()" style="padding: 5px; cursor:pointer;">🔄 Refresh Data</button>
            </div>
        </div>

        <div id="page2" class="page">
            <h2>Detail Pemasukan</h2>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Nominal (Rp)</th>
                    </tr>
                </thead>
                <tbody id="tablePemasukan"></tbody>
            </table>
            <div class="total-row">Total: <span id="totalPemasukanPage">Rp 0</span></div>
        </div>

        <div id="page3" class="page">
            <h2>Detail Pengeluaran</h2>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Nominal (Rp)</th>
                    </tr>
                </thead>
                <tbody id="tablePengeluaran"></tbody>
            </table>
            <div class="total-row">Total: <span id="totalPengeluaranPage">Rp 0</span></div>
        </div>

        <div id="page4" class="page">
            <h2>Grafik Keuangan</h2>
            <canvas id="keuanganChart"></canvas>
        </div>
    </div>

    <script>
        // === GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE SCRIPT KAMU ===
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3rvJIgEEJnT3OAr3LhprAYwDMtsInpsIzYP5_OjyTygqMfNiwokzNDTdPtZkppZHn-w/exec';
        
        // Pilihan Kategori
        const kategoriPemasukan = ["Pekerjaan utama", "Pekerjaan sampingan", "Pemberian/hadiah", "Investasi", "Lainnya"];
        const kategoriPengeluaran = ["Makanan & minuman", "Jajan", "Nongkrong/jalan-jalan", "Belanja", "Transportasi", "Biaya perawatan", "Cicilan", "Tabungan darurat", "Investasi", "Lainnya"];

        let globalData = []; // Menyimpan data dari Google Sheets
        let myChart = null; // Menyimpan instance grafik

        // Navigasi Halaman
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');

            if (pageId === 'page4') renderChart();
        }

        // Update Dropdown Kategori
        function updateKategori() {
            const jenis = document.querySelector('input[name="jenis"]:checked').value;
            const selectKategori = document.getElementById('kategori');
            selectKategori.innerHTML = '';
            
            const options = jenis === 'Pemasukan' ? kategoriPemasukan : kategoriPengeluaran;
            options.forEach(opt => {
                const optionEl = document.createElement('option');
                optionEl.value = opt;
                optionEl.textContent = opt;
                selectKategori.appendChild(optionEl);
            });
        }

        // Format Rupiah
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(angka);

        // Submit Form ke Google Sheets
        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Menyimpan...';
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'addData');
            formData.append('tanggal', document.getElementById('tanggal').value);
            formData.append('jenis', document.querySelector('input[name="jenis"]:checked').value);
            formData.append('kategori', document.getElementById('kategori').value);
            formData.append('nominal', document.getElementById('nominal').value);

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
                alert('Data berhasil disimpan ke Google Sheets!');
                document.getElementById('financeForm').reset();
                fetchData(); // Refresh data otomatis
            } catch (error) {
                alert('Gagal menyimpan data.');
            } finally {
                btn.textContent = 'Simpan ke Google Sheets';
                btn.disabled = false;
            }
        });

        // Mengambil Data dari Google Sheets
        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                // Hapus header baris pertama
                globalData = data.slice(1); 
                processData();
            } catch (error) {
                console.error('Gagal mengambil data:', error);
            }
        }

        // Memproses dan Menampilkan Data ke Tabel & Ringkasan
        function processData() {
            let totalMasuk = 0, totalKeluar = 0;
            const tbodyMasuk = document.getElementById('tablePemasukan');
            const tbodyKeluar = document.getElementById('tablePengeluaran');
            
            tbodyMasuk.innerHTML = '';
            tbodyKeluar.innerHTML = '';

            // Filter bulan ini (opsional: saat ini menghitung semua data untuk simplifikasi)
            globalData.forEach(row => {
                const [tanggal, jenis, kategori, nominal] = row;
                const tglFormat = new Date(tanggal).toLocaleDateString('id-ID');
                const rowHtml = `<tr><td>${tglFormat}</td><td>${kategori}</td><td>${formatRupiah(nominal)}</td></tr>`;

                if (jenis === 'Pemasukan') {
                    totalMasuk += Number(nominal);
                    tbodyMasuk.insertAdjacentHTML('beforeend', rowHtml);
                } else if (jenis === 'Pengeluaran') {
                    totalKeluar += Number(nominal);
                    tbodyKeluar.insertAdjacentHTML('beforeend', rowHtml);
                }
            });

            // Update Teks Total
            document.getElementById('summaryMasuk').textContent = formatRupiah(totalMasuk);
            document.getElementById('summaryKeluar').textContent = formatRupiah(totalKeluar);
            document.getElementById('totalPemasukanPage').textContent = formatRupiah(totalMasuk);
            document.getElementById('totalPengeluaranPage').textContent = formatRupiah(totalKeluar);
        }

        // Render Grafik menggunakan Chart.js
        function renderChart() {
            const ctx = document.getElementById('keuanganChart').getContext('2d');
            
            let totalMasuk = 0, totalKeluar = 0;
            globalData.forEach(row => {
                if(row[1] === 'Pemasukan') totalMasuk += Number(row[3]);
                if(row[1] === 'Pengeluaran') totalKeluar += Number(row[3]);
            });

            if(myChart) myChart.destroy(); // Hapus grafik lama jika ada

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Pemasukan', 'Pengeluaran'],
                    datasets: [{
                        data: [totalMasuk, totalKeluar],
                        backgroundColor: ['#10B981', '#EF4444'],
                        borderWidth: 1
                    }]
                },
                options: { responsive: true }
            });
        }

        // Jalankan fetch data saat pertama kali buka web
        window.onload = fetchData;
    </script>
</body>

</html>
